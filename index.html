<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T64 — Casa di Produzione Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Anton&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #f0ece4; }
    body { font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .brut-wrap { background: #f0ece4; width: 100%; max-width: 860px; min-height: 580px; display: grid; grid-template-rows: auto 1fr auto; border: 3px solid #111; }
    .brut-header { border-bottom: 3px solid #111; display: grid; grid-template-columns: 1fr auto; }
    .brut-logo-cell { padding: 16px 24px; border-right: 3px solid #111; display: flex; align-items: center; height: 120px; }
    .brut-logo-img { height: 121.5%; width: auto; display: block; }
    .brut-meta { padding: 20px 24px; display: flex; flex-direction: column; justify-content: space-between; min-width: 150px; }
    .brut-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #111; line-height: 1.7; }
    .brut-status { display: flex; align-items: center; gap: 7px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #111; font-weight: 700; }
    .brut-dot { width: 8px; height: 8px; background: #111; flex-shrink: 0; animation: blink 1.2s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .brut-body { display: grid; grid-template-columns: 1fr 1fr; }
    .brut-tagline-cell { border-right: 3px solid #111; padding: 40px 28px; display: flex; flex-direction: column; justify-content: flex-end; }
    .brut-tagline { font-family: 'Anton', sans-serif; font-size: 44px; line-height: 1.05; color: #111; letter-spacing: -1px; text-transform: uppercase; }
    .brut-tagline span { display: block; }
    .brut-tagline .inv { background: #111; color: #f0ece4; display: inline-block; padding: 0 6px; }
    .brut-links-cell { display: flex; flex-direction: column; }
    .brut-link { display: flex; align-items: stretch; border-bottom: 3px solid #111; text-decoration: none; cursor: pointer; background: #f0ece4; transition: background 0.12s ease; flex: 1; }
    .brut-link:last-child { border-bottom: none; }
    .brut-link:hover { background: #111; }
    .brut-link:hover .brut-link-num, .brut-link:hover .brut-link-content, .brut-link:hover .brut-link-arrow { color: #f0ece4; border-color: #333; }
    .brut-link-num { font-size: 10px; font-weight: 700; color: #111; border-right: 3px solid #111; padding: 0 13px; display: flex; align-items: center; writing-mode: vertical-rl; letter-spacing: 0.12em; transition: color 0.12s, border-color 0.12s; user-select: none; }
    .brut-link-content { padding: 22px 20px; flex: 1; color: #111; transition: color 0.12s; }
    .brut-link-name { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
    .brut-link-desc { font-size: 10px; opacity: 0.45; letter-spacing: 0.05em; }
    .brut-link-arrow { padding: 0 18px; display: flex; align-items: center; font-size: 22px; color: #111; transition: color 0.12s, transform 0.12s; }
    .brut-link:hover .brut-link-arrow { transform: translateX(3px); }
    .brut-footer { border-top: 3px solid #111; display: grid; grid-template-columns: 1fr 1fr; }
    .brut-footer-left { border-right: 3px solid #111; padding: 14px 24px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #111; }
    .brut-footer-right { padding: 14px 24px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #111; text-align: right; }
    @media (max-width: 600px) {
      body { padding: 0; }
      .brut-wrap { min-height: 100vh; border-left: none; border-right: none; border-top: none; }
      .brut-body { grid-template-columns: 1fr; }
      .brut-tagline-cell { border-right: none; border-bottom: 3px solid #111; padding: 28px 20px; }
      .brut-tagline { font-size: 34px; }
      .brut-logo-cell { height: 90px; }
      .brut-meta { min-width: 120px; }
    }
  </style>
</head>
